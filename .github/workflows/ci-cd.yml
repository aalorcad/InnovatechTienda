name: CI/CD - Tienda Perritos

on:
  push:
    branches:
      - main

env:
  REGION: us-east-1
  CLUSTER_NAME: devopseks

jobs:
  build-and-deploy:
    name: Build, Push y Deploy en EKS
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar credenciales AWS
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.REGION }}

      # 3. Obtener Account ID y URL de ECR
      - name: Obtener Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ecr_url=$ACCOUNT_ID.dkr.ecr.${{ env.REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      # 4. Login a ECR
      - name: Login a Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ steps.account.outputs.ecr_url }}

      # 5. Build y Push Frontend
      - name: Build y Push Frontend
        run: |
          docker build -t tienda-frontend ./frontend
          docker tag tienda-frontend:latest ${{ steps.account.outputs.ecr_url }}/tienda-frontend:eks-v1
          docker push ${{ steps.account.outputs.ecr_url }}/tienda-frontend:eks-v1

      # 6. Build y Push Backend
      - name: Build y Push Backend
        run: |
          docker build -t tienda-backend ./backend
          docker tag tienda-backend:latest ${{ steps.account.outputs.ecr_url }}/tienda-backend:eks-v1
          docker push ${{ steps.account.outputs.ecr_url }}/tienda-backend:eks-v1

      # 7. Build y Push DB
      - name: Build y Push DB
        run: |
          docker build -t tienda-db ./db
          docker tag tienda-db:latest ${{ steps.account.outputs.ecr_url }}/tienda-db:eks-v1
          docker push ${{ steps.account.outputs.ecr_url }}/tienda-db:eks-v1

      # 8. Configurar kubectl
      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig --region ${{ env.REGION }} --name ${{ env.CLUSTER_NAME }}

      # 9. Reemplazar ECR_URL en manifests
      - name: Configurar manifests con ECR URL
        run: |
          find ./k8s -type f -name "*.yaml" \
            -exec sed -i "s|{{ECR_URL}}|${{ steps.account.outputs.ecr_url }}|g" {} \;

      # 10. Deploy en EKS
      - name: Deploy Namespace
        run: kubectl apply -f ./k8s/namespace.yaml

      - name: Deploy MySQL
        run: |
          kubectl apply -f ./k8s/mysql-secret.yaml
          kubectl apply -f ./k8s/mysql-deployment.yaml
          kubectl apply -f ./k8s/mysql-service.yaml
          kubectl rollout status deployment/tienda-db -n tienda --timeout=300s

      - name: Deploy Backend
        run: |
          kubectl apply -f ./k8s/backend-deployment.yaml
          kubectl apply -f ./k8s/backend-service.yaml
          kubectl rollout status deployment/tienda-backend -n tienda --timeout=300s

      - name: Deploy Frontend
        run: |
          kubectl apply -f ./k8s/frontend-deployment.yaml
          kubectl apply -f ./k8s/frontend-service.yaml
          kubectl rollout status deployment/tienda-frontend -n tienda --timeout=300s

      # 11. Mostrar URL final
      - name: URL de la aplicación
        run: |
          kubectl get svc tienda-frontend -n tienda \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
